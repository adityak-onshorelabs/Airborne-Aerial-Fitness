    <rect width="338" height="196" rx="24" fill="url(#teal2)" opacity="0.12"/>
    <text x="24" y="40" fill="#7fecec" font-size="11" font-weight="700" letter-spacing="2">AIRBORNE UNLIMITED</text>
    <text x="24" y="82" fill="#ffffff" font-size="26" font-weight="700">Priya Sharma</text>
    <text x="24" y="106" fill="#bfeeee" font-size="13" opacity="0.85">Member since 2024</text>
    <!-- faux qr -->
