      <rect x="12" y="12" width="52" height="52" rx="12" fill="url(#teal2)" opacity="0.8"/>
      <text x="78" y="34" fill="#0d1f1e" font-size="15" font-weight="600">Mat Pilates</text>
      <text x="78" y="56" fill="#728281" font-size="12">Mazgaon studio</text>
      <rect x="250" y="26" width="74" height="26" rx="13" fill="#e6f6f6"/>
      <text x="287" y="43" fill="#068384" font-size="11" font-weight="600" text-anchor="middle">Booked</text>
    </g>
  </g>

