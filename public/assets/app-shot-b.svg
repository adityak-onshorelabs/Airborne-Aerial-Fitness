    <g transform="translate(130,792)"><rect x="-8" y="0" width="16" height="14" rx="3" fill="#c4d3d2"/><text y="30" fill="#9fb0af">Classes</text></g>
    <g transform="translate(195,786)"><circle r="22" fill="#04C0C1"/><path d="M-7 0h14M0 -7v14" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></g>
    <g transform="translate(260,792)"><rect x="-8" y="0" width="16" height="14" rx="3" fill="#c4d3d2"/><text y="30" fill="#9fb0af">Studios</text></g>
