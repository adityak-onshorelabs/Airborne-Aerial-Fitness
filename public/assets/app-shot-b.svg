      <g fill="#0b2a29" transform="translate(6,6)">
        <rect width="10" height="10"/><rect x="26" width="10" height="10"/><rect y="26" width="10" height="10"/>
        <rect x="16" y="4" width="4" height="4"/><rect x="20" y="16" width="4" height="4"/><rect x="30" y="24" width="6" height="6"/><rect x="16" y="30" width="4" height="4"/>
      </g>
    </g>
    <text x="86" y="150" fill="#eafeff" font-size="13" opacity="0.9">Show at the studio</text>
