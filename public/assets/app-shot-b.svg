<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" fill="none" font-family="'Geist','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="teal2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04C0C1"/>
      <stop offset="1" stop-color="#009B9D"/>
    </linearGradient>
    <linearGradient id="dark2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2a29"/>
      <stop offset="1" stop-color="#0f403f"/>
