  </defs>
  <rect width="390" height="844" fill="#F5F9F9"/>

  <!-- status bar -->
  <text x="26" y="34" fill="#0d1f1e" font-size="14" font-weight="600">9:41</text>
  <g fill="#0d1f1e"><rect x="330" y="24" width="18" height="11" rx="2"/><rect x="352" y="22" width="14" height="13" rx="3"/><rect x="311" y="24" width="14" height="11" rx="2" opacity="0.5"/></g>

  <!-- header -->
  <circle cx="34" cy="74" r="15" fill="#eaf2f2"/>
  <path d="M39 68l-6 6 6 6" stroke="#0d1f1e" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="195" y="79" fill="#0d1f1e" font-size="16" font-weight="700" text-anchor="middle">Membership</text>

  <!-- membership card -->
  <g transform="translate(26,110)">
